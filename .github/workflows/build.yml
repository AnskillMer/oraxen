name: Build Oraxen

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build core module (skip tests, javadoc, and heavy NMS decompilation tasks)
        run: |
          ./gradlew :core:build \
            -x test \
            -x javadoc \
            -x :nms:decompile \
            -x :nms:paperweightDecompile \
            --no-daemon \
            --continue

      - name: Upload built JAR
        uses: actions/upload-artifact@v4
        with:
          name: Oraxen
          path: core/build/libs/*.jar
