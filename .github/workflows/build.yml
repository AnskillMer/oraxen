name: Build Oraxen Jar
on:
  workflow_dispatch: # Позволяет запускать сборку вручную по кнопке

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Init Git Profile
        run: |
          git init
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Initial commit for Grgit"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Paper Platform
        run: ./gradlew :platforms:paper:assemble -x test -x javadoc

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: oraxen-plugin
          path: platforms/paper/build/libs/*.jar
