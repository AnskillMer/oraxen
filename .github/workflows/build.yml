name: Build Oraxen Jar
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Paper Platform
        run: ./gradlew :paper:assemble -x test -x javadoc

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: oraxen-plugin
          path: platforms/paper/build/libs/*.jar
